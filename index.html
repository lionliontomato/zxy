 <title>小亦の歌單</title>
 <link href="https://fonts.googleapis.com" rel="preconnect" />
 <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />

<body>
 <div class="bg-art"></div>
 <div class="bg-mountain"></div>
 <div class="bg-clouds"></div>
 <div class="bg-moon"></div>
 <div class="bg-lantern"></div>
 <div class="bg-blossom"></div>
 <div class="bg-bamboo"></div>
 <div class="bg-jade"><span></span><i></i><b></b></div>
 <div class="bg-scroll"></div>
 <div class="bg-fan"></div>
 <div class="float-layer" id="floatLayer"></div>

 <main class="wrap">
  <section class="hero">
   <span class="eyebrow">♫</span>
   <h1 id="siteTitle"></h1>
   <p id="siteSubtitle"></p>

   <div class="controls">
    <input class="search" id="search" placeholder="搜尋歌名、歌手或分類…" />
    <button class="random" id="randomBtn" type="button">隨機抽歌</button>
   </div>

   <div class="tags" id="tags"></div>

   <div class="meta">
    <span id="count">讀取中…</span>
    <span class="status" id="status"></span>
   </div>
  </section>

  <section class="grid" id="grid"></section>
  <button class="load-more" id="loadMoreBtn" type="button">載入更多</button>
  <div class="empty" id="empty">沒有找到符合條件的歌曲</div>
 </main>

 </footer>

 <div class="modal" id="modal">
  <div class="modal-card">
   <h2 id="modalTitle">小亦推薦</h2>
   <div class="big" id="pickSong"></div>
   <div id="pickArtist"></div>
   <button class="close" id="closeModal" type="button">好聽愛聽</button>
  </div>
 </div>
